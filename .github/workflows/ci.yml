name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache : "pip"

      - run: pip install -r requirements.txt

      - run: pytest

      - name: Report create
        run : echo "Create Test" > report.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.txt

  build:
    runs-on: ubuntu-latest

    needs: test

    steps:
      - uses: actions/checkout@v4

      - name:  Build Docker Image
        run : |
          docker build -t cicd-app:${{ github.sha }} .  # gives uniques version for production of docker Image
          # docker build -t cicd-app:v1 . 



