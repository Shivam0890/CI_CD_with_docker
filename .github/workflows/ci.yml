name: CI Pipeline

on:
  push:
    branches:
      - main
  

  pull_request :
    branches:
      -main



jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache : "pip"

      - run: pip install -r requirements.txt

      - run: pytest

      - name: Report create
        run : echo "Create Test" > report.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.txt

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_TOKEN }}


  build:
    runs-on: ubuntu-latest

    needs: test

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}


      - uses: actions/checkout@v4

      - name:  Build Docker Image
        run : |
          docker build -t ${{ secrets.DOCKER_USERNAME  }}/cicd-app:${{ github.sha }} .  # gives uniques version for production of docker Image
          # docker build -t cicd-app:v1 . 


      - name: PUSH IMAGE 
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-app:${{ github.sha }}




